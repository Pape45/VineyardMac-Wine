name: Build Wine

on:
  pull_request:
  push:
  workflow_dispatch:
    inputs:
      upload_to_r2:
        description: Upload Libraries.tar.gz, WhiskyWineVersion.plist, and SUMS.sha to R2
        required: false
        type: boolean
        default: false

env: 
  CC: clang
  CXX: clang++
  CPATH: /usr/local/include
  LIBRARY_PATH: /usr/local/lib
  CFLAGS: -O3
  CROSSCFLAGS: -O3 -Wno-error=incompatible-pointer-types -Wno-error=int-conversion
  LDFLAGS: -Wl,-ld_classic -Wl,-headerpad_max_install_names -Wl,-rpath,@loader_path/../../ -Wl,-rpath,/usr/local/lib
  MACOSX_DEPLOYMENT_TARGET: 10.14
  WINE_CONFIGURE: $GITHUB_WORKSPACE/configure
  BUILDROOT: $GITHUB_WORKSPACE/build
  WINE_INSTALLROOT: install
  WINE_MONO: https://github.com/madewokherd/wine-mono/releases/download/wine-mono-7.4.1/wine-mono-7.4.1-x86.tar.xz

jobs:
  sdk-smoke:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Check macOS SDK headers
        run: |
          mkdir -p "$RUNNER_TEMP/vineyardmac-smoke"
          printf '#define HAVE_AVFOUNDATION_AVFOUNDATION_H 1\n' > "$RUNNER_TEMP/vineyardmac-smoke/config.h"

          xcrun --sdk macosx clang -m64 -fblocks -fsyntax-only -x objective-c \
            -I "$RUNNER_TEMP/vineyardmac-smoke" \
            -I dlls/winecoreaudio.drv \
            -I include \
            -D__WINESRC__ \
            -DWINE_NO_LONG_TYPES \
            -D_UCRT \
            -DWINE_UNIX_LIB \
            -Wall \
            -pipe \
            -fcf-protection=none \
            -fno-stack-protector \
            -fno-strict-aliasing \
            -Wdeclaration-after-statement \
            -Wempty-body \
            -Wignored-qualifiers \
            -Winit-self \
            -Wno-pragma-pack \
            -Wstrict-prototypes \
            -Wtype-limits \
            -Wvla \
            -Wwrite-strings \
            -Wpointer-arith \
            -fPIC \
            -fasynchronous-unwind-tables \
            -O3 \
            -U_FORTIFY_SOURCE \
            -D_FORTIFY_SOURCE=0 \
            dlls/winecoreaudio.drv/authorization.m

          cat > "$RUNNER_TEMP/vineyardmac-smoke/security.c" <<'EOF'
          #include <CoreFoundation/CFString.h>
          #define LoadResource mac_LoadResource
          #define GetCurrentThread mac_GetCurrentThread
          #include <CoreServices/CoreServices.h>
          #include <Security/cssmtype.h>
          #include <Security/SecKeychain.h>
          #include <Security/SecKeychainItem.h>
          #include <Security/SecKeychainSearch.h>
          #include <Security/SecTrustSettings.h>
          #undef LoadResource
          #undef GetCurrentThread

          int main(void)
          {
              SecKeychainSearchRef search = 0;
              SecKeychainItemRef item = 0;
              SecKeychainAttributeList *attr_list = 0;
              SecKeychainAttributeInfo info = {0};
              SecKeychainSearchCreateFromAttributes(0, kSecGenericPasswordItemClass, 0, &search);
              SecKeychainSearchCopyNext(search, &item);
              SecKeychainItemCopyAttributesAndData(item, &info, 0, &attr_list, 0, 0);
              return 0;
          }
          EOF

          xcrun --sdk macosx clang -m64 -fsyntax-only "$RUNNER_TEMP/vineyardmac-smoke/security.c"

          cat > "$RUNNER_TEMP/vineyardmac-smoke/coreaudio.c" <<'EOF'
          #define LoadResource __carbon_LoadResource
          #define CompareString __carbon_CompareString
          #define GetCurrentThread __carbon_GetCurrentThread
          #define GetCurrentProcess __carbon_GetCurrentProcess
          #include <MacTypes.h>
          #include <libkern/OSAtomic.h>
          #include <CoreAudio/CoreAudio.h>
          #include <AudioToolbox/AudioFormat.h>
          #include <AudioToolbox/AudioConverter.h>
          #include <AudioUnit/AudioUnit.h>
          #undef LoadResource
          #undef CompareString
          #undef GetCurrentThread
          #undef GetCurrentProcess
          #undef _CDECL

          int main(void)
          {
              return noErr;
          }
          EOF

          xcrun --sdk macosx clang -m64 -fsyntax-only "$RUNNER_TEMP/vineyardmac-smoke/coreaudio.c"

          cat > "$RUNNER_TEMP/vineyardmac-smoke/coremidi.c" <<'EOF'
          #define ULONG __carbon_ULONG
          #define E_INVALIDARG __carbon_E_INVALIDARG
          #define E_OUTOFMEMORY __carbon_E_OUTOFMEMORY
          #define E_HANDLE __carbon_E_HANDLE
          #define E_ACCESSDENIED __carbon_E_ACCESSDENIED
          #define E_UNEXPECTED __carbon_E_UNEXPECTED
          #define E_FAIL __carbon_E_FAIL
          #define E_ABORT __carbon_E_ABORT
          #define E_POINTER __carbon_E_POINTER
          #define E_NOINTERFACE __carbon_E_NOINTERFACE
          #define E_NOTIMPL __carbon_E_NOTIMPL
          #define S_FALSE __carbon_S_FALSE
          #define S_OK __carbon_S_OK
          #define HRESULT_FACILITY __carbon_HRESULT_FACILITY
          #define IS_ERROR __carbon_IS_ERROR
          #define FAILED __carbon_FAILED
          #define SUCCEEDED __carbon_SUCCEEDED
          #define MAKE_HRESULT __carbon_MAKE_HRESULT
          #define HRESULT __carbon_HRESULT
          #define STDMETHODCALLTYPE __carbon_STDMETHODCALLT
          #include <MacTypes.h>
          #include <CoreFoundation/CFPlugInCOM.h>
          #include <mach/mach_time.h>
          #include <CoreMIDI/CoreMIDI.h>
          #include <AudioUnit/AudioUnit.h>
          #include <AudioToolbox/AudioToolbox.h>
          #undef ULONG
          #undef E_INVALIDARG
          #undef E_OUTOFMEMORY
          #undef E_HANDLE
          #undef E_ACCESSDENIED
          #undef E_UNEXPECTED
          #undef E_FAIL
          #undef E_ABORT
          #undef E_POINTER
          #undef E_NOINTERFACE
          #undef E_NOTIMPL
          #undef S_FALSE
          #undef S_OK
          #undef HRESULT_FACILITY
          #undef IS_ERROR
          #undef FAILED
          #undef SUCCEEDED
          #undef MAKE_HRESULT
          #undef HRESULT
          #undef STDMETHODCALLTYPE

          int main(void)
          {
              ItemCount items = 0;
              ByteCount bytes = 0;
              return (int)(items + bytes);
          }
          EOF

          xcrun --sdk macosx clang -m64 -fsyntax-only "$RUNNER_TEMP/vineyardmac-smoke/coremidi.c"

          cat > "$RUNNER_TEMP/vineyardmac-smoke/iokit.c" <<'EOF'
          #define E_PENDING __carbon_E_PENDING
          #define ULONG __carbon_ULONG
          #define E_INVALIDARG __carbon_E_INVALIDARG
          #define E_OUTOFMEMORY __carbon_E_OUTOFMEMORY
          #define E_HANDLE __carbon_E_HANDLE
          #define E_ACCESSDENIED __carbon_E_ACCESSDENIED
          #define E_UNEXPECTED __carbon_E_UNEXPECTED
          #define E_FAIL __carbon_E_FAIL
          #define E_ABORT __carbon_E_ABORT
          #define E_POINTER __carbon_E_POINTER
          #define E_NOINTERFACE __carbon_E_NOINTERFACE
          #define E_NOTIMPL __carbon_E_NOTIMPL
          #define S_FALSE __carbon_S_FALSE
          #define S_OK __carbon_S_OK
          #define HRESULT_FACILITY __carbon_HRESULT_FACILITY
          #define IS_ERROR __carbon_IS_ERROR
          #define FAILED __carbon_FAILED
          #define SUCCEEDED __carbon_SUCCEEDED
          #define MAKE_HRESULT __carbon_MAKE_HRESULT
          #define HRESULT __carbon_HRESULT
          #define STDMETHODCALLTYPE __carbon_STDMETHODCALLTYPE
          #define PAGE_SHIFT __carbon_PAGE_SHIFT
          #include <CoreFoundation/CFPlugInCOM.h>
          #include <IOKit/IOKitLib.h>
          #include <IOKit/hid/IOHIDLib.h>
          #include <IOKit/IOCFPlugIn.h>
          #include <IOKit/usb/IOUSBLib.h>
          #undef E_PENDING
          #undef ULONG
          #undef E_INVALIDARG
          #undef E_OUTOFMEMORY
          #undef E_HANDLE
          #undef E_ACCESSDENIED
          #undef E_UNEXPECTED
          #undef E_FAIL
          #undef E_ABORT
          #undef E_POINTER
          #undef E_NOINTERFACE
          #undef E_NOTIMPL
          #undef S_FALSE
          #undef S_OK
          #undef HRESULT_FACILITY
          #undef IS_ERROR
          #undef FAILED
          #undef SUCCEEDED
          #undef MAKE_HRESULT
          #undef HRESULT
          #undef STDMETHODCALLTYPE
          #undef PAGE_SHIFT

          int main(void)
          {
              return kIOReturnSuccess;
          }
          EOF

          xcrun --sdk macosx clang -m64 -fsyntax-only "$RUNNER_TEMP/vineyardmac-smoke/iokit.c"

          cat > "$RUNNER_TEMP/vineyardmac-smoke/winemac_carbon.m" <<'EOF'
          #include <objc/NSObjCRuntime.h>
          #include <CoreFoundation/CFAttributedString.h>
          #import <Foundation/NSExtensionContext.h>
          #import <AppKit/AppKit.h>
          #include <CoreServices/../Frameworks/OSServices.framework/Headers/IconStorage.h>
          #include <CoreServices/../Frameworks/LaunchServices.framework/Headers/IconsCore.h>
          #include <ApplicationServices/../Frameworks/HIServices.framework/Headers/HIShape.h>
          #include <ApplicationServices/../Frameworks/QD.framework/Headers/ColorSyncDeprecated.h>
          #include <Carbon/../Frameworks/HIToolbox.framework/Headers/HIToolbox.h>

          int main(void)
          {
              return 0;
          }
          EOF

          xcrun --sdk macosx clang -m64 -fsyntax-only -x objective-c \
            -D__WINESRC__ \
            -DWINE_NO_LONG_TYPES \
            "$RUNNER_TEMP/vineyardmac-smoke/winemac_carbon.m"

          cat > "$RUNNER_TEMP/vineyardmac-smoke/winemac_hostaddrspace.m" <<'EOF'
          #include <objc/NSObjCRuntime.h>
          #include <CoreFoundation/CFAttributedString.h>
          #import <Foundation/NSExtensionContext.h>
          #import <AppKit/AppKit.h>
          #include "wine/hostaddrspace_enter.h"
          #include "macdrv_cocoa.h"

          int main(void)
          {
              return 0;
          }
          EOF

          xcrun --sdk macosx clang -m64 -fsyntax-only -x objective-c \
            -I include \
            -I dlls/winemac.drv \
            -D__WINESRC__ \
            -DWINE_NO_LONG_TYPES \
            "$RUNNER_TEMP/vineyardmac-smoke/winemac_hostaddrspace.m"

          for source in \
            dlls/winemac.drv/cocoa_app.m \
            dlls/winemac.drv/cocoa_event.m \
            dlls/winemac.drv/cocoa_clipboard.m \
            dlls/winemac.drv/cocoa_cursorclipping.m \
            dlls/winemac.drv/cocoa_display.m \
            dlls/winemac.drv/cocoa_opengl.m \
            dlls/winemac.drv/cocoa_window.m
          do
            xcrun --sdk macosx clang -m64 -fblocks -fsyntax-only -x objective-c \
              -I "$RUNNER_TEMP/vineyardmac-smoke" \
              -I dlls/winemac.drv \
              -I include \
              -D__WINESRC__ \
              -DWINE_NO_LONG_TYPES \
              -D_UCRT \
              -DWINE_UNIX_LIB \
              -Wall \
              -pipe \
              -fcf-protection=none \
              -fno-stack-protector \
              -fno-strict-aliasing \
              -Wdeclaration-after-statement \
              -Wempty-body \
              -Wignored-qualifiers \
              -Winit-self \
              -Wno-pragma-pack \
              -Wstrict-prototypes \
              -Wtype-limits \
              -Wvla \
              -Wwrite-strings \
              -Wpointer-arith \
              -fPIC \
              -fasynchronous-unwind-tables \
              -O3 \
              -U_FORTIFY_SOURCE \
              -D_FORTIFY_SOURCE=0 \
              "$source"
          done

          cat > "$RUNNER_TEMP/vineyardmac-smoke/winemac_power.c" <<'EOF'
          #define GetCurrentThread Mac_GetCurrentThread
          #define LoadResource Mac_LoadResource
          #include <CoreServices/CoreServices.h>
          #include <CoreServices/../Frameworks/OSServices.framework/Headers/Power.h>
          #undef GetCurrentThread
          #undef LoadResource

          int main(void)
          {
              UpdateSystemActivity(UsrActivity);
              return 0;
          }
          EOF

          xcrun --sdk macosx clang -m64 -fsyntax-only \
            "$RUNNER_TEMP/vineyardmac-smoke/winemac_power.c"

          cat > "$RUNNER_TEMP/vineyardmac-smoke/freetype_macos.c" <<'EOF'
          #define LoadResource __carbon_LoadResource
          #define CheckMenuItem __carbon_CheckMenuItem
          #define CompareString __carbon_CompareString
          #define GetCurrentThread __carbon_GetCurrentThread
          #define GetCurrentProcess __carbon_GetCurrentProcess
          #define AnimatePalette __carbon_AnimatePalette
          #define DeleteMenu __carbon_DeleteMenu
          #define DrawMenu __carbon_DrawMenu
          #define DrawMenuBar __carbon_DrawMenuBar
          #define EnableMenuItem __carbon_EnableMenuItem
          #define EqualRgn __carbon_EqualRgn
          #define FillRgn __carbon_FillRgn
          #define FrameRgn __carbon_FrameRgn
          #define GetMenu __carbon_GetMenu
          #define GetPixel __carbon_GetPixel
          #define InvertRgn __carbon_InvertRgn
          #define IsWindowVisible __carbon_IsWindowVisible
          #define LineTo __carbon_LineTo
          #define MoveWindow __carbon_MoveWindow
          #define OffsetRgn __carbon_OffsetRgn
          #define PaintRgn __carbon_PaintRgn
          #define Polygon __carbon_Polygon
          #define ResizePalette __carbon_ResizePalette
          #define SetRectRgn __carbon_SetRectRgn
          #define ShowWindow __carbon_ShowWindow
          #include <CoreFoundation/CFAttributedString.h>
          #include <CoreServices/CoreServices.h>
          #include <CoreText/CoreText.h>
          #include <ApplicationServices/ApplicationServices.h>
          #undef LoadResource
          #undef CheckMenuItem
          #undef CompareString
          #undef GetCurrentThread
          #undef GetCurrentProcess
          #undef AnimatePalette
          #undef DeleteMenu
          #undef DrawMenu
          #undef DrawMenuBar
          #undef EnableMenuItem
          #undef EqualRgn
          #undef FillRgn
          #undef FrameRgn
          #undef GetMenu
          #undef GetPixel
          #undef InvertRgn
          #undef IsWindowVisible
          #undef LineTo
          #undef MoveWindow
          #undef OffsetRgn
          #undef PaintRgn
          #undef Polygon
          #undef ResizePalette
          #undef SetRectRgn
          #undef ShowWindow

          int main(void)
          {
              FSRef ref;
              FamRec *fam = 0;
              AsscEntry *assoc = 0;
              CTFontCollectionRef collection = 0;
              (void)ref;
              (void)fam;
              (void)assoc;
              (void)collection;
              return 0;
          }
          EOF

          xcrun --sdk macosx clang -m64 -fsyntax-only \
            -D__WINESRC__ \
            -DWINE_NO_LONG_TYPES \
            "$RUNNER_TEMP/vineyardmac-smoke/freetype_macos.c"

  build:
    needs: sdk-smoke
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install Homebrew Packages
        continue-on-error: true
        run: |
          REQUIRED_PACKAGES=(
              # Build Dependencies
              "bison"
              "pkg-config"

              # Dependencies
              "freetype"
              "gettext"
              "gnutls"
              "gstreamer"
              "sdl2"
              "molten-vk"
              "winetricks"
          )

          brew update
          brew install "${REQUIRED_PACKAGES[@]}"

      - name: Install pinned build tools
        run: |
          # mingw-w64 12+ defaults to UCRT; this Wine branch still expects MSVCRT.
          brew tap-new vineyardmac/build-deps
          CX_LLVM_FORMULA="$(brew --repo vineyardmac/build-deps)/Formula/cx-llvm.rb"
          curl -L -o "$CX_LLVM_FORMULA" https://raw.githubusercontent.com/Gcenx/homebrew-wine/1b2afa7cfa7718d9ea209698f3d1b11f87bba205/Formula/cx-llvm.rb
          sed -i '' '/-DLIBOMP_ARCH=x86_64/a\
              -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          ' "$CX_LLVM_FORMULA"
          curl -L -o "$(brew --repo vineyardmac/build-deps)/Formula/mingw-w64.rb" https://raw.githubusercontent.com/Homebrew/homebrew-core/31209a399a7b40bf2cd3abd7aee2715547ccd5bd/Formula/m/mingw-w64.rb
          brew install --formula --build-from-source vineyardmac/build-deps/cx-llvm
          brew install --formula vineyardmac/build-deps/mingw-w64

      - name: Add bison and cx-llvm to PATH
        run: |
          echo "$(brew --prefix bison)/bin" >> $GITHUB_PATH
          echo "$(brew --prefix cx-llvm)/bin" >> $GITHUB_PATH

      - name: Check compiler
        run: |
          clang --version
          printf 'int main(void){return 0;}' | clang -x c -m64 -mabi=ms -c -o /tmp/mabi.o -

      - name: Configure wine64
        run: |
          set -x

          export ac_cv_lib_soname_MoltenVK="libMoltenVK.dylib"
          export ac_cv_lib_soname_vulkan=""
          export ac_cv_header_ApplicationServices_ApplicationServices_h="yes"
          export ac_cv_header_Carbon_Carbon_h="yes"

          mkdir -p ${{ env.BUILDROOT }}/wine64
          pushd ${{ env.BUILDROOT }}/wine64
          ${{ env.WINE_CONFIGURE }} \
            --prefix= \
            --disable-tests \
            --disable-winedbg \
            --enable-win64 \
            --without-alsa \
            --without-capi \
            --with-coreaudio \
            --with-cups \
            --without-dbus \
            --without-fontconfig \
            --with-freetype \
            --with-gettext \
            --without-gettextpo \
            --without-gphoto \
            --with-gnutls \
            --without-gssapi \
            --with-gstreamer \
            --without-krb5 \
            --with-mingw \
            --without-netapi \
            --with-opencl \
            --with-opengl \
            --without-oss \
            --with-pcap \
            --with-pthread \
            --without-pulse \
            --without-sane \
            --with-sdl \
            --without-udev \
            --with-unwind \
            --without-usb \
            --without-v4l2 \
            --with-vulkan \
            --without-x 
          popd

      - name: Build wine64
        run: |
          pushd ${{ env.BUILDROOT }}/wine64
          make -j$(sysctl -n hw.ncpu 2>/dev/null)
          popd

      - name: Install wine64
        run: |
          pushd ${{ env.BUILDROOT }}/wine64
          make install-lib DESTDIR="$GITHUB_WORKSPACE/${{ env.WINE_INSTALLROOT }}"
          popd
  
      - name: Configure wine32on64
        run: |
          set -x

          export ac_cv_lib_soname_MoltenVK="libMoltenVK.dylib"
          export ac_cv_lib_soname_vulkan=""
          export ac_cv_header_ApplicationServices_ApplicationServices_h="yes"
          export ac_cv_header_Carbon_Carbon_h="yes"

          mkdir -p ${{ env.BUILDROOT }}/wine32on64
          pushd ${{ env.BUILDROOT }}/wine32on64
          ${{ env.WINE_CONFIGURE }} \
            --prefix= \
            --disable-loader \
            --disable-tests \
            --disable-winedbg \
            --enable-win32on64 \
            --without-alsa \
            --without-capi \
            --with-coreaudio \
            --with-cups \
            --without-dbus \
            --without-fontconfig \
            --with-freetype \
            --with-gettext \
            --without-gettextpo \
            --without-gphoto \
            --with-gnutls \
            --without-gssapi \
            --without-gstreamer \
            --without-inotify \
            --without-krb5 \
            --with-mingw \
            --without-netapi \
            --without-openal \
            --with-opencl \
            --with-opengl \
            --without-oss \
            --with-pcap \
            --with-pthread \
            --without-pulse \
            --without-sane \
            --with-sdl \
            --without-udev \
            --with-unwind \
            --without-usb \
            --without-v4l2 \
            --with-vulkan \
            --with-wine64=${{ env.BUILDROOT }}/wine64 \
            --without-x
          popd

      - name: Build wine32on64
        run: |
          pushd ${{ env.BUILDROOT }}/wine32on64
          make -j$(sysctl -n hw.ncpu 2>/dev/null)
          popd

      - name: Install wine32on64
        run: |
          pushd ${{ env.BUILDROOT }}/wine32on64
          make install-lib DESTDIR="$GITHUB_WORKSPACE/${{ env.WINE_INSTALLROOT }}"
          popd

      - name: Grab Verbs From Winetricks
        run: |
          curl -L -o verbs.txt https://raw.githubusercontent.com/Winetricks/winetricks/master/files/verbs/all.txt

      - name: Create Final Package
        run: |
          mkdir -p Libraries/DXVK
          mkdir -p Libraries/Wine

          cp -a ${{ env.WINE_INSTALLROOT }}/. Libraries/Wine/

          rm -rf Libraries/Wine/share/man

          cp -a $(brew --prefix winetricks)/bin/winetricks Libraries
          cp -a verbs.txt Libraries
          cp -a DXVK Libraries

      - name: Copy External Libs
        run: |
          chmod +x .github/dylib_packer.zsh
          .github/dylib_packer.zsh

      - name: Install GPTK
        run: |
          ditto GPTK/redist/lib/ Libraries/Wine/lib/

      - name: Copy Version .plist
        run: |
          cp -a WhiskyWineVersion.plist Libraries/

      - name: Install WineMono
        run: |
          mkdir Libraries/Wine/share/wine/mono

          curl -L -o mono.tar.xz ${{ env.WINE_MONO }}
          tar -xzf mono.tar.xz -C Libraries/Wine/share/wine/mono

      - name: Build Checksum
        run: |
          REQUIRED_FILES=(
            "Libraries/Wine/bin/wine64"
            "Libraries/Wine/bin/wineserver"
            "Libraries/Wine/lib/libfreetype.6.dylib"
            "Libraries/Wine/lib/libgnutls.30.dylib"
            "Libraries/Wine/lib/wine/x86_64-unix/winemac.so"
            "Libraries/Wine/lib/wine/x86_64-windows/winemac.drv"
            "Libraries/Wine/lib/wine/x86_32on64-unix/winemac.so"
            "Libraries/Wine/lib/wine/i386-windows/winemac.drv"
          )

          for file in "${REQUIRED_FILES[@]}"; do
            test -e "$file" || { echo "Missing required packaged file: $file"; exit 1; }
          done

          Libraries/Wine/bin/wine64 --version
          find ./Libraries -type f -exec shasum "{}" + > SUMS.sha

      - name: Upload config64.log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: config64
          path: build/wine64/config.log

      - name: Upload config32.log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: config32
          path: build/wine32on64/config.log
  
      - name: Tar Libraries
        if: success()
        run: |
          tar -zcf Libraries.tar.gz Libraries
          
      - name: Upload Libraries
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Libraries
          path: Libraries.tar.gz

      - name: Upload SUMS
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SUMS
          path: SUMS.sha

      - name: Upload Libraries to VineyardMac R2
        if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' && inputs.upload_to_r2 }}
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACL: private
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.RCLONE_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.RCLONE_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.RCLONE_ENDPOINT }}
        run: |
          brew install rclone
          rclone copy Libraries.tar.gz r2:vineyardmac/Wine
          rclone copy WhiskyWineVersion.plist r2:vineyardmac/Wine
          rclone copy SUMS.sha r2:vineyardmac/Wine
